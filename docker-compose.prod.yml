# ============================================================
# GovAI 生产环境 Docker Compose
# 部署在内网服务器 10.16.49.100 上，与 Dify 同服务器
# ============================================================

services:
  postgres:
    image: govai-postgres:latest
    build:
      # 固定到仓库内的 PG16 + AGE 构建，避免 latest 漂移破坏已有数据卷
      context: ${GOVAI_SOURCE_ROOT:-.}
      dockerfile: age.Dockerfile
      args:
        http_proxy: "${http_proxy:-}"
        https_proxy: "${https_proxy:-}"
    container_name: govai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-govai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-govai_password}
      POSTGRES_DB: ${POSTGRES_DB:-govai_db}
      PGDATA: /var/lib/postgresql/data
    # 生产环境不对外暴露数据库端口
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ${GOVAI_SOURCE_ROOT:-.}/doc/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - govai-network
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-govai_user} -d ${POSTGRES_DB:-govai_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: govai-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-govai_redis_2026}
    volumes:
      - redis_data:/data
    networks:
      - govai-network
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD:-govai_redis_2026}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  converter:
    image: govai-converter:latest
    build:
      context: ${GOVAI_SOURCE_ROOT:-.}
      dockerfile: converter/Dockerfile
    container_name: govai-converter
    restart: unless-stopped
    expose:
      - "8001"
    networks:
      - govai-network
    deploy:
      resources:
        limits:
          memory: 1g
    volumes:
      - converter_shared:/shared
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend:
    image: govai-backend:latest
    build:
      context: ${GOVAI_SOURCE_ROOT:-.}/backend
      dockerfile: Dockerfile.prod
      args:
        http_proxy: "${http_proxy:-}"
        https_proxy: "${https_proxy:-}"
        HTTP_PROXY: "${HTTP_PROXY:-}"
        HTTPS_PROXY: "${HTTPS_PROXY:-}"
        ALL_PROXY: "${ALL_PROXY:-}"
        all_proxy: "${all_proxy:-}"
        NO_PROXY: "${NO_PROXY:-}"
        no_proxy: "${no_proxy:-}"
    container_name: govai-backend
    restart: unless-stopped
    expose:
      - "8000"
    extra_hosts:
      - "host.docker.internal:${HOST_GATEWAY_IP:-10.16.88.18}"
    networks:
      - govai-network
    env_file:
      - .env.production
    environment:
      # ── 基础设施（容器内部通信） ──
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-govai_user}:${POSTGRES_PASSWORD:-govai_password}@postgres:5432/${POSTGRES_DB:-govai_db}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-govai_redis_2026}@redis:6379/0"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      APP_DEBUG: "false"
      UPLOAD_DIR: "/app/uploads"
      CONVERTER_URL: "http://converter:8001"
      CORS_ORIGINS: '["http://${SERVER_IP:-10.16.49.100}","http://${SERVER_IP:-10.16.49.100}:${FRONTEND_PORT:-80}"]'
      # ── Dify 配置（同服务器，通过 host.docker.internal 访问） ──
      DIFY_MOCK: "${DIFY_MOCK:-false}"
      DIFY_BASE_URL: "http://host.docker.internal:${DIFY_API_PORT:-5001}/v1"
      DIFY_DATASET_API_KEY: "${DIFY_DATASET_API_KEY}"
      DIFY_APP_DOC_DRAFT_KEY: "${DIFY_APP_DOC_DRAFT_KEY}"
      DIFY_APP_DOC_OPTIMIZE_KEY: "${DIFY_APP_DOC_OPTIMIZE_KEY}"
      DIFY_APP_CHAT_KEY: "${DIFY_APP_CHAT_KEY}"
      DIFY_APP_ENTITY_EXTRACT_KEY: "${DIFY_APP_ENTITY_EXTRACT_KEY}"
      DIFY_APP_DOC_FORMAT_KEY: "${DIFY_APP_DOC_FORMAT_KEY}"
      DIFY_APP_FORMAT_SUGGEST_KEY: "${DIFY_APP_FORMAT_SUGGEST_KEY}"
      DIFY_CONSOLE_URL: "http://${SERVER_IP:-10.16.49.100}:${DIFY_UI_PORT:-8990}"
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # ── 代码热挂载（无需重建镜像，重启即可更新） ──
      - ${GOVAI_SOURCE_ROOT:-.}/backend/app:/app/app:ro
      - ${GOVAI_SOURCE_ROOT:-.}/backend/alembic:/app/alembic:ro
      - ${GOVAI_SOURCE_ROOT:-.}/backend/alembic.ini:/app/alembic.ini:ro
      # ── 持久化 ──
      - backend_uploads:/app/uploads
      - converter_shared:/shared

  # ── 前端构建器（按需运行，非常驻服务） ──
  frontend-builder:
    image: node:18-alpine
    container_name: govai-frontend-builder
    working_dir: /src
    volumes:
      - ${GOVAI_SOURCE_ROOT:-.}:/src
      - frontend_node_modules:/src/node_modules
    environment:
      - NODE_ENV=production
    entrypoint: ["sh", "-c"]
    command:
      [
        "npm config set registry https://registry.npmmirror.com && npm install -g pnpm 2>/dev/null; pnpm config set registry https://registry.npmmirror.com && pnpm install && pnpm run build",
      ]
    profiles:
      - build # 仅在 --profile build 时运行

  frontend:
    image: nginx:latest
    container_name: govai-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      # ── 前端构建产物挂载（由 frontend-builder 生成） ──
      - ${GOVAI_SOURCE_ROOT:-.}/dist:/usr/share/nginx/html:ro
      - ${GOVAI_SOURCE_ROOT:-.}/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - govai-network

volumes:
  postgres_data:
    # 生产主 compose 保持可移植；当前服务器若需复用历史卷，请叠加
    # docker-compose.prod.current-server.yml。
    name: govai_postgres_data
  redis_data:
    name: govai_redis_data
  converter_shared:
    name: govai_converter_shared
  backend_uploads:
    name: govai_backend_uploads
  frontend_node_modules:
    name: govai_frontend_node_modules

networks:
  govai-network:
    name: govai-network
    driver: bridge
