          y: 280.79191055559556
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 242
      - data:
          context:
            enabled: false
            variable_selector: []
          memory:
            query_prompt_template: "{{#sys.query#}}


              {{#sys.files#}}"
            role_prefix:
              assistant: ""
              user: ""
            window:
              enabled: true
              size: 3
          model:
            completion_params:
              enable_thinking: true
              response_format: json_object
            mode: chat
            name: qwen3-32b
            provider: langgenius/tongyi/tongyi
          prompt_template:
            - id: 76c4eb52-f199-4ed8-8438-a2e216dedd8f
              role: system
              text:
                "你是一个专业的信息抽取专家。你的任务是从用户提供的文本或上传的文档中抽取\"实体\"和\"实体之间的关系\"。\n\n## 适用场景\n\
                - 从法规/制度/公文中抽取：机构-职责、文件-依据、系统-使用、部门-隶属等关系\n- 从业务流程中抽取：角色-职责、步骤-顺序、系统-功能等关系\n\
                - 为知识库构建结构化索引，用于后续问答时做\"关系追溯/证据串联\"\n\n## 抽取规则\n1. **实体识别**：识别文本中所有重要的实体（人、机构、概念、系统、文件等）\n\
                2. **关系抽取**：识别实体之间的明确关系（不要编造）\n3. **命名统一**：同一实体在不同地方出现时，使用统一的名称\n4. **类型规范**：实体\
                \ type 必须从以下选择：法规、机构、部门、人员、概念、系统、文件、地点、其他\n5. **关系标准化**：使用标准动词短语，如：\"\
                隶属于\"、\"负责\"、\"规定\"、\"适用于\"、\"发布\"、\"引用\"、\"包含\"、\"使用\"、\"审批\"、\"执行\"\
                、\"依据\"\n\n## 字段说明\n- **id**: 实体或关系的唯一标识符（使用简短英文或拼音，如 entity_1, rel_1）\n\
                - **name**: 实体名称（从文本中提取的原始名称）\n- **type**: 实体类型（从规定的类型中选择）\n- **aliases**:\
                \ 实体的别名列表（如果文本中有多种叫法）\n- **attributes.article**: 实体相关的条款或来源信息\n- **confidence**:\
                \ 置信度（0-1之间，表示对抽取结果的确信程度）\n- **relation_type**: 关系类型（使用标准动词短语）\n- **source/target**:\
                \ 关系的源实体和目标实体的 id\n- **attributes.description**: 关系的描述或原文证据\n\n## 示例\n\
                输入文本：\"《数据安全法》第二十一条规定国家建立数据分类分级保护制度。财务部门负责审批报销申请。\"\n\n输出：\n{\n  \"query\"\
                : \"实体抽取\",\n  \"entities\": [\n    {\n      \"id\": \"entity_1\",\n \
                \     \"name\": \"数据安全法\",\n      \"type\": \"法规\",\n      \"aliases\"\
                : [],\n      \"attributes\": {\"article\": \"第二十一条\"},\n      \"confidence\"\
                : 1.0\n    },\n    {\n      \"id\": \"entity_2\",\n      \"name\": \"\
                数据分类分级保护制度\",\n      \"type\": \"概念\",\n      \"aliases\": [],\n     \
                \ \"attributes\": {\"article\": \"\"},\n      \"confidence\": 1.0\n  \
                \  },\n    {\n      \"id\": \"entity_3\",\n      \"name\": \"财务部门\",\n\
                \      \"type\": \"部门\",\n      \"aliases\": [\"财务\"],\n      \"attributes\"\
                : {\"article\": \"\"},\n      \"confidence\": 1.0\n    },\n    {\n   \
                \   \"id\": \"entity_4\",\n      \"name\": \"报销申请\",\n      \"type\":\
                \ \"概念\",\n      \"aliases\": [],\n      \"attributes\": {\"article\"\
                : \"\"},\n      \"confidence\": 1.0\n    }\n  ],\n  \"relations\": [\n\
                \    {\n      \"id\": \"rel_1\",\n      \"source\": \"entity_1\",\n  \
                \    \"relation_type\": \"规定\",\n      \"target\": \"entity_2\",\n   \
                \   \"attributes\": {\n        \"description\": \"《数据安全法》第二十一条规定国家建立数据分类分级保护制度\"\
                \n      },\n      \"confidence\": 1.0\n    },\n    {\n      \"id\": \"\
                rel_2\",\n      \"source\": \"entity_3\",\n      \"relation_type\": \"\
                负责\",\n      \"target\": \"entity_4\",\n      \"attributes\": {\n    \
                \    \"description\": \"财务部门负责审批报销申请\"\n      },\n      \"confidence\"\
                : 1.0\n    }\n  ]\n}\n\n现在请分析用户提供的文本，提取所有实体和关系。"
            - id: b8058db3-ebf8-4a91-be46-7b0a5383e2dc
              role: user
