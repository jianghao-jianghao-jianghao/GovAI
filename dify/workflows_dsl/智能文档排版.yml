app:
  description:
    AI智能文档排版 — 支持粗略指令（如"这是通知"）、精确指令（如"标题红色二号"）和混合指令。支持全量排版和增量微调，输出带字体字号颜色等完整格式属性的结构化
    JSON
  icon: 🤖
  icon_background: "#E0E7FF"
  mode: advanced-chat
  name: 智能文档排版
  use_icon_as_answer_icon: false
