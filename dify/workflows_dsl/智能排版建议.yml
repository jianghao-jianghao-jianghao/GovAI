app:
  description: 智能排版建议 — 分析文档内容，给出详细的排版格式建议（字体、字号、行距、缩进、对齐等），支持公文、学术、法律等多种文档类型
  icon: 🤖
  icon_background: "#DBEAFE"
  mode: advanced-chat
  name: 智能排版建议
  use_icon_as_answer_icon: false
dependencies:
  - current_identifier: null
    type: marketplace
    value:
      marketplace_plugin_unique_identifier: langgenius/tongyi:0.1.28@ad074894f4aac6840ef8fb68dbfcf51d13c7800450757a8d99bacbefd245a6ab
      version: null
kind: app
version: 0.6.0
workflow:
  conversation_variables: []
  environment_variables: []
  features:
