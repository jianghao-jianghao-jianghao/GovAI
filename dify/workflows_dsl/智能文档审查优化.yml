  description: 文档审查与优化 — 支持文件上传，自动提取内容，一次性完成错别字/语法/标点/措辞/敏感词/结构/时效性/一致性/数据核查等全面审查，结构化
    JSON 输出
  icon: 🤖
  icon_background: '#FEF3C7'
  mode: advanced-chat
  name: 智能文档审查优化
